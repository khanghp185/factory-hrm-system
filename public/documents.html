<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory HRM - Tài liệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 10px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: #343a40; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h4 class="text-center mb-4">Factory HRM</h4>
                <a href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a href="employees.html"><i class="bi bi-people me-2"></i> Nhân viên</a>
                <a href="schedule.html"><i class="bi bi-calendar3 me-2"></i> Lịch làm việc</a>
                <a href="leave.html"><i class="bi bi-briefcase me-2"></i> Nghỉ phép</a>
                <a href="documents.html" class="active"><i class="bi bi-file-earmark-text me-2"></i> Tài liệu</a>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Kho lưu trữ Tài liệu</h1>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#uploadDocModal">
                        <i class="bi bi-upload"></i> Tải lên tài liệu
                    </button>
                </div>

                <div class="row" id="document-grid">
                    <!-- Data will be loaded here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Upload Document Modal -->
    <div class="modal fade" id="uploadDocModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tải tài liệu mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadDocForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Tên tài liệu</label>
                            <input type="text" class="form-control" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phân loại</label>
                            <select class="form-select" name="category">
                                <option value="SOP">Hướng dẫn vận hành (SOP)</option>
                                <option value="Quy trình">Quy trình kỹ thuật</option>
                                <option value="Nội quy">Nội quy & Thông báo</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chọn tệp</label>
                            <input type="file" class="form-control" name="file" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Tải lên</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function fetchDocuments() {
            const res = await fetch('/api/documents');
            const data = await res.json();
            const grid = document.getElementById('document-grid');
            grid.innerHTML = data.map(d => `
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <i class="bi bi-file-earmark-pdf text-danger fs-1 me-3"></i>
                                <div>
                                    <h6 class="mb-0">${d.title}</h6>
                                    <small class="text-muted">${d.category}</small>
                                </div>
                            </div>
                            <p class="small text-muted mb-3">Tải lên: ${new Date(d.upload_date).toLocaleDateString()}</p>
                            <a href="/${d.file_path}" target="_blank" class="btn btn-sm btn-outline-primary w-100">
                                <i class="bi bi-download"></i> Tải về
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('uploadDocForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            const res = await fetch('/api/documents', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('uploadDocModal')).hide();
                e.target.reset();
                fetchDocuments();
            }
        };

        window.onload = fetchDocuments;
    </script>
</body>
</html>
