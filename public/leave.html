<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory HRM - Nghỉ phép</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 10px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: #343a40; }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h4 class="text-center mb-4">Factory HRM</h4>
                <div class="px-3 mb-4 text-center">
                    <div class="small text-muted">Xin chào,</div>
                    <div id="user-display" class="fw-bold text-white">Guest</div>
                    <button onclick="logout()" class="btn btn-sm btn-outline-danger mt-2 w-100">Đăng xuất</button>
                </div>
                <a href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a href="employees.html"><i class="bi bi-people me-2"></i> Nhân viên</a>
                <a href="schedule.html"><i class="bi bi-calendar3 me-2"></i> Lịch làm việc</a>
                <a href="leave.html" class="active"><i class="bi bi-briefcase me-2"></i> Nghỉ phép</a>
                <a href="documents.html"><i class="bi bi-file-earmark-text me-2"></i> Tài liệu</a>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý Nghỉ phép</h1>
                    <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#addLeaveModal">
                        <i class="bi bi-plus-circle"></i> Tạo đơn mới
                    </button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nhân viên</th>
                                    <th>Từ ngày</th>
                                    <th>Đến ngày</th>
                                    <th>Lý do</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="leave-list">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Leave Modal -->
    <div class="modal fade" id="addLeaveModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Đăng ký nghỉ phép</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addLeaveForm">
                        <div class="mb-3">
                            <label class="form-label">Nhân viên</label>
                            <select class="form-select" name="employee_id" id="select-employee-leave" required></select>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Từ ngày</label>
                                <input type="date" class="form-control" name="start_date" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Đến ngày</label>
                                <input type="date" class="form-control" name="end_date" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Lý do nghỉ</label>
                            <textarea class="form-control" name="reason" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Gửi đơn</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadEmployees() {
            const res = await fetch('/api/employees');
            const data = await res.json();
            document.getElementById('select-employee-leave').innerHTML = data.map(e => 
                `<option value="${e.id}">${e.full_name}</option>`
            ).join('');
        }

        async function fetchLeave() {
            const res = await fetch('/api/leave');
            const data = await res.json();
            const tbody = document.getElementById('leave-list');
            tbody.innerHTML = data.map(l => `
                <tr>
                    <td>${l.employee_name}</td>
                    <td>${l.start_date}</td>
                    <td>${l.end_date}</td>
                    <td>${l.reason}</td>
                    <td><span class="badge bg-warning">${l.status}</span></td>
                </tr>
            `).join('');
        }

        document.getElementById('addLeaveForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const body = Object.fromEntries(formData.entries());
            
            const res = await fetch('/api/leave', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addLeaveModal')).hide();
                e.target.reset();
                fetchLeave();
            }
        };

        window.onload = () => {
            loadEmployees();
            fetchLeave();
        };
    </script>
</body>
</html>
