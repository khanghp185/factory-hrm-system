<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory HRM - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15); background: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">Factory HRM</h3>
        <p class="text-center text-muted small">Đăng nhập để tiếp tục</p>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" name="username" required placeholder="admin / nhanvien">
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" name="password" required placeholder="123456">
            </div>
            <div id="errorMsg" class="alert alert-danger d-none small p-2"></div>
            <button type="submit" class="btn btn-primary w-100 py-2">Đăng nhập</button>
        </form>
        <div class="mt-4 text-center">
            <small class="text-muted">Thông tin đăng nhập mặc định có trong quanly.md</small>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('user')) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const body = Object.fromEntries(formData.entries());
            const errorDiv = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.innerText = "Lỗi kết nối server";
                errorDiv.classList.remove('d-none');
            }
        };
    </script>
</body>
</html>
