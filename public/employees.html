<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory HRM - Nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 10px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: #343a40; }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h4 class="text-center mb-4">Factory HRM</h4>
                <div class="px-3 mb-4 text-center">
                    <div class="small text-muted">Xin chào,</div>
                    <div id="user-display" class="fw-bold text-white">Guest</div>
                    <button onclick="logout()" class="btn btn-sm btn-outline-danger mt-2 w-100">Đăng xuất</button>
                </div>
                <a href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a href="employees.html" class="active"><i class="bi bi-people me-2"></i> Nhân viên</a>
                <a href="schedule.html"><i class="bi bi-calendar3 me-2"></i> Lịch làm việc</a>
                <a href="leave.html"><i class="bi bi-briefcase me-2"></i> Nghỉ phép</a>
                <a href="documents.html"><i class="bi bi-file-earmark-text me-2"></i> Tài liệu</a>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý Nhân viên</h1>
                    <button class="btn btn-primary admin-only" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
                        <i class="bi bi-plus-lg"></i> Thêm nhân viên
                    </button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Họ và tên</th>
                                    <th>Chức vụ</th>
                                    <th>Phòng ban</th>
                                    <th>Ngày tham gia</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="employee-list">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm nhân viên mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addEmployeeForm">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" name="full_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chức vụ</label>
                            <input type="text" class="form-control" name="position" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phòng ban / Tổ</label>
                            <input type="text" class="form-control" name="department" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ngày tham gia</label>
                            <input type="date" class="form-control" name="join_date" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Lưu thông tin</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function fetchEmployees() {
            const res = await fetch('/api/employees');
            const data = await res.json();
            const tbody = document.getElementById('employee-list');
            tbody.innerHTML = data.map(e => `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.full_name}</td>
                    <td>${e.position}</td>
                    <td>${e.department}</td>
                    <td>${e.join_date}</td>
                    <td><span class="badge bg-success">${e.status}</span></td>
                </tr>
            `).join('');
        }

        document.getElementById('addEmployeeForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const body = Object.fromEntries(formData.entries());
            
            const res = await fetch('/api/employees', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addEmployeeModal')).hide();
                e.target.reset();
                fetchEmployees();
            }
        };

        window.onload = fetchEmployees;
    </script>
</body>
</html>
